name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-tests:
    name: PHP 8.4 · Laravel tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSER_CACHE_DIR: ~/.composer/cache/files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, pdo_sqlite, sqlite3, dom, curl
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-${{ runner.os }}-php-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-8.4-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHP lint and tests
        run: composer test
